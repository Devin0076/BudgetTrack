<!DOCTYPE html>
<html>
<head>
  <title>BudgetTrack MVP</title>
</head>
<body>
  <h1>BudgetTrack MVP</h1>

  <h2>Auth</h2>
  <input id="email" placeholder="Email" />
  <input id="password" type="password" placeholder="Password" />
  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>

  <h2>Create Transaction</h2>
  <input id="amount" placeholder="Amount" />
  <input id="category" placeholder="Category" />
  <select id="type">
    <option value="expense">Expense</option>
    <option value="income">Income</option>
  </select>
  <input id="date" type="date" />
  <input id="description" placeholder="Description" />
  <button onclick="createTransaction()">Add Transaction</button>

  <h2>Transactions</h2>
  <button onclick="loadTransactions()">Load Transactions</button>
  <ul id="transactions"></ul>

  <script>
    let token = null;

    async function register() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      const res = await fetch("http://localhost:3001/api/auth/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password })
      });

      const data = await res.json();
      alert(JSON.stringify(data));
    }

    async function login() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      const res = await fetch("http://localhost:3001/api/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password })
      });

      const data = await res.json();
      token = data.token;
      alert("Logged in");
    }

    async function createTransaction() {
      const amount = document.getElementById("amount").value;
      const category = document.getElementById("category").value;
      const type = document.getElementById("type").value;
      const date = document.getElementById("date").value;
      const description = document.getElementById("description").value;

      const res = await fetch("http://localhost:3001/api/transactions", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + token
        },
        body: JSON.stringify({ amount, category, type, date, description })
      });

      const data = await res.json();
      alert(JSON.stringify(data));
    }

    async function loadTransactions() {
      const res = await fetch("http://localhost:3001/api/transactions", {
        headers: {
          "Authorization": "Bearer " + token
        }
      });

      const data = await res.json();

      const list = document.getElementById("transactions");
      list.innerHTML = "";

      data.transactions.forEach(tx => {
        const li = document.createElement("li");
        li.textContent = `${tx.category} - ${tx.amount} (${tx.type})`;
        list.appendChild(li);
      });
    }
  </script>
</body>
</html>
